  <!-- This is where the content begins -->

  <body>
  <div class="bg"></div>
 
  <main class="card">
    <div class="logo">
      <!-- Tax<span>Remit</span> -->
      <img src="/Logo.svg" alt="">
    </div>
 
    <h1 class="heading">Login</h1>
    <p class="subtext">Good to see you again.</p>
 
    <div class="field">
      <label for="email">Email address</label>
      <div class="input-wrap">
        <input type="email" id="email" placeholder="olivia@untitledui.com" autocomplete="email"/>
        
        <span class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="M2 7l10 7 10-7"/>
          </svg>
        </span>
      </div>
    </div>
 
    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
        <button type="button" class="icon toggle-pw" aria-label="Toggle password visibility" onclick="togglePassword()">
          <svg id="eye-off" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20C7 20 2.73 16.39 1 12c.74-1.9 1.97-3.58 3.54-4.88M9.9 4.24A10.94 10.94 0 0 1 12 4c5 0 9.27 3.61 11 8a11.05 11.05 0 0 1-1.67 2.95M1 1l22 22"/>
            <path d="M10.73 10.73A3 3 0 0 0 15 15"/>
          </svg>
          <svg id="eye-on" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" style="display:none">
            <path d="M1 12C2.73 7.61 7 4 12 4s9.27 3.61 11 8c-1.73 4.39-6 8-11 8S2.73 16.39 1 12z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <p class="cant-remember-password">Can't remember password? <a href="/Pages/Forgotpassword.html" class="link">Recover</a></p>
    </div>
 
    <button class="btn-login">Login</button>
 
    <p class="signup-text">Don't have an account? <a href="/Pages/Userlogin.html" class="link">Create one</a></p>
  </main>
</body>

<!-- This is the script -->
 
<script>
function togglePassword() {
  const input = document.getElementById('password');
  const eyeOff = document.getElementById('eye-off');
  const eyeOn  = document.getElementById('eye-on');
  
  if (input.type === 'password') {
    input.type = 'text';
    eyeOff.style.display = 'none';
    eyeOn.style.display  = 'block';
  } else {
    input.type = 'password';
    eyeOff.style.display = 'block';
    eyeOn.style.display  = 'none';
  }
}
</script>
